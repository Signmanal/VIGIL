name: Desktop Release Installers

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      confirm_tag:
        description: "Tag to package and upload (for example, desktop-v0.18.0). Must already exist."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ inputs.confirm_tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  RELEASE_TAG: ${{ inputs.confirm_tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.label }} installer
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            runner: macos-latest
            script: dist:mac

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true
          persist-credentials: false
          ref: ${{ inputs.confirm_tag || github.ref }}

      - name: Validate tag exists
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if ! git tag -l "$RELEASE_TAG" | grep -q .; then
            echo "::error::Tag '$RELEASE_TAG' does not exist in the repo"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: npm
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Check macOS signing availability
        id: mac-signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
        run: |
          if [[ -n "$CSC_LINK" && -n "$CSC_KEY_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::MAC_CSC_LINK and MAC_CSC_KEY_PASSWORD are missing; publishing unsigned macOS installers."
          fi

      - name: Validate macOS signing environment
        if: runner.os == 'macOS' && steps.mac-signing.outputs.available == 'true'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
        run: npm run release:mac:check-env --workspace apps/desktop

      - name: Disable macOS code signing for unsigned fallback
        if: runner.os == 'macOS' && steps.mac-signing.outputs.available != 'true'
        run: |
          echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          echo "VIGIL_DESKTOP_UNSIGNED_MAC_RELEASE=1" >> "$GITHUB_ENV"

      - name: Build desktop installer
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          GH_TOKEN: ${{ github.token }}
        run: npm run ${{ matrix.script }} --workspace apps/desktop -- --publish never

      - name: Notarize macOS DMG
        if: runner.os == 'macOS' && steps.mac-signing.outputs.available == 'true'
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          shopt -s nullglob
          for dmg in apps/desktop/release/*.dmg; do
            node apps/desktop/scripts/notarize-artifact.cjs "$dmg"
          done

      - name: Refresh macOS update metadata
        if: runner.os == 'macOS'
        run: npm run release:mac:refresh-metadata --workspace apps/desktop

      - name: Verify macOS release artifacts
        if: runner.os == 'macOS'
        env:
          VIGIL_ALLOW_UNSIGNED_MAC_RELEASE: ${{ steps.mac-signing.outputs.available == 'true' && '0' || '1' }}
          VIGIL_REQUIRE_MAC_GATEKEEPER: ${{ steps.mac-signing.outputs.available == 'true' && '1' || '0' }}
          VIGIL_REQUIRE_MAC_SIGNING: ${{ steps.mac-signing.outputs.available == 'true' && '1' || '0' }}
        run: npm run release:mac:verify-artifacts --workspace apps/desktop

      - name: Collect installer assets
        shell: bash
        run: |
          mkdir -p desktop-release-assets
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const source = path.join('apps', 'desktop', 'release')
          const target = 'desktop-release-assets'
          const assetPattern = /\.(blockmap|dmg|yml|zip)$/i

          if (!fs.existsSync(source)) {
            throw new Error(`Missing release directory: ${source}`)
          }

          for (const name of fs.readdirSync(source)) {
            const from = path.join(source, name)
            if (!fs.statSync(from).isFile() || !assetPattern.test(name)) {
              continue
            }
            fs.copyFileSync(from, path.join(target, name))
          }

          const assets = fs.readdirSync(target)
          if (assets.length === 0) {
            throw new Error('No desktop installer assets were produced')
          }

          console.log(assets.join('\n'))
          NODE

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-${{ matrix.label }}-installers
          path: desktop-release-assets/*
          if-no-files-found: error

  publish:
    name: Upload installers to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true
          path: desktop-release-assets

      - name: Ensure release exists
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "XCLAW $RELEASE_TAG" \
            --notes "Desktop installers for $RELEASE_TAG." \
            --verify-tag

      - name: Upload desktop installers
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          find desktop-release-assets -maxdepth 1 -type f -print
          gh release upload "$RELEASE_TAG" desktop-release-assets/* --repo "$GITHUB_REPOSITORY" --clobber
