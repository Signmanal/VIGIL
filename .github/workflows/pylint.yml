name: Pylint

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pylint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pylint-smoke:
    name: Pylint smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Install dependencies
        run: |
          uv venv --python 3.13
          uv pip install -e '.[dev,acp]' pylint

      - name: Run Pylint smoke
        run: |
          uv run python -m pylint --errors-only \
            vigil_constants.py \
            vigil_cli/banner.py \
            vigil_cli/skin_engine.py \
            vigil_cli/_parser.py \
            vigil_cli/dashboard_auth/login_page.py \
            acp_adapter/entry.py
