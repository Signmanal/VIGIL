name: VIGIL Guards

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  guardrails:
    name: Secret and branding guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Secret scan
        run: scripts/secret_scan.sh
      - name: Branding check
        run: scripts/check_branding.sh
