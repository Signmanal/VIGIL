name: VIGIL Guards

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  guardrails:
    name: Secret and branding guardrails (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Install guard tools
        shell: bash
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          if command -v rg >/dev/null 2>&1; then
            exit 0
          fi
          case "$RUNNER_OS" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y ripgrep
              ;;
            macOS)
              brew install ripgrep
              ;;
            Windows)
              choco install ripgrep -y
              ;;
          esac
      - name: Secret scan
        shell: bash
        run: scripts/secret_scan.sh
      - name: Branding check
        shell: bash
        run: scripts/check_branding.sh
