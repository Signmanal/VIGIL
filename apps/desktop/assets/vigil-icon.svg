<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="XCLAW app icon">
  <defs>
    <linearGradient id="bg" x1="114" y1="70" x2="902" y2="948" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08131d"/>
      <stop offset=".45" stop-color="#031018"/>
      <stop offset="1" stop-color="#021d19"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#1ce7ff" stop-opacity=".32"/>
      <stop offset=".48" stop-color="#0b6b78" stop-opacity=".16"/>
      <stop offset="1" stop-color="#02070a" stop-opacity="0"/>
